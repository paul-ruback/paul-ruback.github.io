<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f4f0;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 3rem 3rem 1.5rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  header h1 {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: #111;
  }
  header span {
    font-size: 0.8rem;
    color: #999;
    letter-spacing: 0.04em;
  }

  /* ── MASONRY GRID ── */
  .gallery {
    columns: 3;
    column-gap: 12px;
    padding: 0 3rem 4rem;
  }

  @media (max-width: 900px) { .gallery { columns: 2; padding: 0 1.5rem 3rem; } }
  @media (max-width: 500px) { .gallery { columns: 1; padding: 0 1rem 2rem; } }

 .gallery-item {
  break-inside: avoid;
  margin-bottom: 12px;
  overflow: hidden;
  cursor: zoom-in;
  background: #e8e6e1;
}
.gallery-item img {
  width: 100%;
  display: block;
  transition: transform 0.5s ease, opacity 0.3s;
  opacity: 0;
}
.gallery-item img.loaded { opacity: 1; }
.gallery-item:hover img { transform: scale(1.02); }

.gallery-item video {
  width: 100%;
  display: block;
  transition: transform 0.5s ease;
}
.gallery-item:hover video { transform: scale(1.02); }
 
  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    display: block;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #lightbox img.fade { opacity: 0; }

  .lb-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.3); font-size: 2rem; padding: 1.5rem;
    transition: color 0.15s; z-index: 5;
    pointer-events: all;
  }
  .lb-btn:hover { color: #fff; }
  #lb-prev { left: 0; }
  #lb-next { right: 0; }
  .lb-btn.hidden { display: none; }

  #lb-close {
    position: absolute; top: 1.5rem; right: 1.5rem;
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.4); font-size: 1.5rem;
    transition: color 0.15s;
  }
  #lb-close:hover { color: #fff; }

  #lb-counter {
    position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font-size: 0.8rem; letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<header>
  <h1>Portfolio</h1>
  <span id="photo-count"></span>
</header>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-btn hidden" id="lb-prev">&#8592;</button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-btn hidden" id="lb-next">&#8594;</button>
  <button id="lb-close">&#10005;</button>
  <span id="lb-counter"></span>
</div>

<script>
const photos = [
  "photo1.jpg",
 { type: "video", src: "movie1.mp4" },
  "photo5.jpg",
 "photo2.jpg",
 { type: "video", src: "movie2.mov" },
  "photo6.jpg",
 "photo6.1.jpg",
 "photo30.jpg",
  "photo8.jpg",
 "photo7.jpg",
 "photo31.jpg",
 { type: "video", src: "movie3.mov" },
 { type: "video", src: "movie4.mov" },
  "photo9.jpg",
  "photo10.jpg",
  "photo11.jpg",
  "photo12.jpg",
  "photo13.jpg",
 "photo15.jpg",
 { type: "video", src: "movie7.mov" },
 "photo16.jpg",
 "photo17.jpg",
 { type: "video", src: "movie8.mp4" },
 "photo18.jpg",
 "photo20.jpg",
 "photo21.jpg",
 "photo22.jpg",
 "photo23.jpg",
];
  // ─────────────────────────────────────────────

  const gallery   = document.getElementById('gallery');
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbPrev    = document.getElementById('lb-prev');
  const lbNext    = document.getElementById('lb-next');
  const lbClose   = document.getElementById('lb-close');
  const lbCounter = document.getElementById('lb-counter');
  let current = 0;

  document.getElementById('photo-count').textContent = photos.length + ' works';

  // Build gallery
 photos.forEach((src, i) => {
  const item = document.createElement('div');
  item.className = 'gallery-item';

  if (src.type === 'video') {
    const video = document.createElement('video');
    video.src = src.src;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.autoplay = true;
    item.appendChild(video);
  } else {
    const img = document.createElement('img');
    img.src = src;
    img.alt = '';
    img.addEventListener('load', () => img.classList.add('loaded'));
    item.appendChild(img); // ← fixed
  }

  item.addEventListener('click', (e) => { e.stopPropagation(); openLightbox(i); });
  gallery.appendChild(item);
});
 
  // Lightbox
  function openLightbox(index) {
    current = index;
    lbImg.src = photos[current];
    updateLightbox();
    lightbox.classList.add('open');
  }

  function updateLightbox() {
    lbImg.classList.add('fade');
    setTimeout(() => {
      lbImg.src = photos[current];
      lbImg.classList.remove('fade');
    }, 150);
    lbCounter.textContent = (current + 1) + ' / ' + photos.length;
    lbPrev.classList.toggle('hidden', current === 0);
    lbNext.classList.toggle('hidden', current === photos.length - 1);
  }

  function closeLightbox() { lightbox.classList.remove('open'); }

  lbPrev.addEventListener('click', (e) => { e.stopPropagation(); current--; updateLightbox(); });
  lbNext.addEventListener('click', (e) => { e.stopPropagation(); current++; updateLightbox(); });
  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', closeLightbox);

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft' && current > 0)               { current--; updateLightbox(); }
    if (e.key === 'ArrowRight' && current < photos.length-1){ current++; updateLightbox(); }
    if (e.key === 'Escape') closeLightbox();
  });

  // Touch swipe in lightbox
  let touchStartX = 0;
  lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend', e => {
    const delta = e.changedTouches[0].clientX - touchStartX;
    if (delta > 50 && current > 0)               { current--; updateLightbox(); }
    if (delta < -50 && current < photos.length-1){ current++; updateLightbox(); }
  });
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Flip Card</title>
 
  <style>
    /* ============================================================
       PASTE THIS ENTIRE <style> BLOCK INTO YOUR SITE'S CSS
       ============================================================ */
 
    /* --- Card scene (perspective wrapper) ---------------------- */
    .card-scene {
      width: 100%;
      max-width: 520px;
      height: 240px;
      perspective: 1000px;
      cursor: pointer;
      font-family: system-ui, sans-serif;  /* matches your site */
    }
 
    /* --- The flipping card ------------------------------------- */
    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.4, 0, 0.2, 1);
    }
 
    .flip-card.is-flipped {
      transform: rotateY(180deg);
    }
 
    /* --- Shared face styles ------------------------------------ */
    .flip-card__face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 14px;
      background: transparent;
      border: 1px solid rgba(17, 17, 17, 0.08);  /* subtle on #f5f4f0 */
      overflow: hidden;
      box-sizing: border-box;
    }
 
    .flip-card__face--back {
      transform: rotateY(180deg);
    }
 
    /* --- Window chrome (traffic lights + title bar) ------------ */
    .flip-card__win-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 22px;
    }
 
    .flip-card__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
 
    .flip-card__win-title {
      font-size: 10px;
      color: #999;
      margin-left: 8px;
      letter-spacing: 0.04em;  /* matches your site */
    }
 
    /* --- Front face -------------------------------------------- */
    .flip-card__front-inner {
      padding: 2rem 3rem;       /* matches your header padding */
      height: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
 
    .flip-card__prompt {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;        /* matches your header span */
      color: #999;
      letter-spacing: 0.04em;
      line-height: 1.8;
    }
 
    .flip-card__prompt-symbol {
      color: #f778ba;            /* pink accent */
    }
 
    .flip-card__name {
      font-size: 1.8rem;
      font-weight: 400;          /* matches your site's light weight */
      color: #111;
      letter-spacing: 0.04em;
      line-height: 1.2;
      margin: 8px 0 6px;
      opacity: 0;
      animation: card-pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards;
    }
 
    .flip-card__role {
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.04em;   /* matches your header span */
      margin-bottom: 10px;
      opacity: 0;
      animation: card-fade-in 0.4s ease 1.3s forwards;
    }
 
    .flip-card__hint {
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.04em;
      opacity: 0;
      animation: card-fade-in 0.4s ease 1.7s forwards;
    }
 
    .flip-card__front-footer {
      margin-top: auto;
      border-top: 1px solid rgba(17, 17, 17, 0.06);
      padding-top: 12px;
      display: flex;
      justify-content: flex-end;
    }
 
    .flip-card__filename {
      font-size: 0.7rem;
      color: #999;
      letter-spacing: 0.04em;
    }
 
    /* blinking cursor */
    .flip-card__cursor {
      display: inline-block;
      width: 2px;
      height: 1.4rem;
      background: #111;
      vertical-align: middle;
      margin-left: 3px;
      animation: card-blink 1s step-end infinite;
    }
 
    /* --- Back face --------------------------------------------- */
    .flip-card__back-inner {
      padding: 2rem 3rem;       /* matches your header padding */
      height: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
 
    .flip-card__back-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(17, 17, 17, 0.06);
    }
 
    .flip-card__back-name {
      font-size: 1rem;
      font-weight: 400;
      color: #111;
      letter-spacing: 0.04em;
    }
 
    .flip-card__back-cmd {
      font-size: 0.7rem;
      color: #999;
      letter-spacing: 0.04em;
    }
 
    /* contact rows */
    .flip-card__contacts {
      display: flex;
      flex-direction: column;
      gap: 11px;
      flex: 1;
      justify-content: center;
    }
 
    .flip-card__contact-row {
      display: flex;
      align-items: center;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }
 
    .flip-card__contact-key {
      color: #999;
      min-width: 84px;
      flex-shrink: 0;
    }
 
    .flip-card__contact-eq {
      color: rgba(17, 17, 17, 0.2);
      margin-right: 8px;
    }
 
    .flip-card__contact-val {
      color: #111;
    }
 
    .flip-card__contact-val a {
      color: #f778ba;            /* pink accent */
      text-decoration: none;
    }
 
    .flip-card__contact-val a:hover {
      text-decoration: underline;
    }
 
    .flip-card__back-footer {
      border-top: 1px solid rgba(17, 17, 17, 0.06);
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
 
    .flip-card__back-footer-right {
      font-size: 0.7rem;
      color: #999;
      letter-spacing: 0.04em;
    }
 
    /* --- Keyframe animations ----------------------------------- */
    @keyframes card-pop-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
 
    @keyframes card-fade-in {
      to { opacity: 1; }
    }
 
    @keyframes card-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>
 
  <!--
  ================================================================
    TERMINAL FLIP CARD — portfolio hero component
    Matched to: system-ui font · #f5f4f0 bg · #111/#999 palette
  ================================================================
  HOW TO USE
  ──────────
  1. Copy the <style> block above into your site's CSS file.
  2. Paste this HTML wherever you want the card (e.g. inside <header>
     or at the top of your <main>).
  3. Replace every  ← EDIT THIS  comment with your own info.
  4. Copy the <script> block into your JS file (or keep it inline).
  No external fonts or dependencies needed.
  ================================================================
  -->
 
  <div class="card-scene" id="cardScene" role="button" aria-label="Contact card — click to flip" tabindex="0">
    <div class="flip-card" id="flipCard">
 
      <!-- ── FRONT FACE ──────────────────────────────────────── -->
      <div class="flip-card__face flip-card__face--front">
        <div class="flip-card__front-inner">
 
          <div>
            <!-- window chrome -->
            <div class="flip-card__win-bar">
              <div class="flip-card__dot" style="background:#ff5f57"></div>
              <div class="flip-card__dot" style="background:#febc2e"></div>
              <div class="flip-card__dot" style="background:#28c840"></div>
              <span class="flip-card__win-title">
                portfolio.sh — bash  <!-- ← EDIT THIS (or remove) -->
              </span>
            </div>
 
            <!-- shell prompt -->
            <div class="flip-card__prompt">
              <span class="flip-card__prompt-symbol">~</span>
              <span>./introduce.sh</span>  <!-- ← EDIT THIS -->
            </div>
 
            <!-- your name -->
            <div class="flip-card__name">
              Paul<span class="flip-card__cursor"></span>  <!-- ← EDIT THIS -->
            </div>
 
            <!-- your role / tagline -->
            <div class="flip-card__role">
              Creative Direction & Design  <!-- ← EDIT THIS -->
            </div>
 
            <!-- flip prompt -->
            <div class="flip-card__hint">flip for contact ⟶</div>
          </div>
 
          <div class="flip-card__front-footer">
            <span class="flip-card__filename">
              portfolio.io  <!-- ← EDIT THIS or remove entirely -->
            </span>
          </div>
 
        </div>
      </div>
      <!-- ── END FRONT ─────────────────────────────────────── -->
 
 
      <!-- ── BACK FACE ───────────────────────────────────────── -->
      <div class="flip-card__face flip-card__face--back">
        <div class="flip-card__back-inner">
 
          <div class="flip-card__back-header">
            <span class="flip-card__back-name">
              Paul <!-- ← EDIT THIS -->
            </span>
            <span class="flip-card__back-cmd">contact --all</span>
          </div>
 
          <div class="flip-card__contacts">
 
            <!-- EMAIL -->
            <div class="flip-card__contact-row">
              <span class="flip-card__contact-key">email</span>
              <span class="flip-card__contact-eq">=</span>
              <span class="flip-card__contact-val">
                <a href="mailto:paulcruback@gmail.com">paulcruback@gmail.com</a>  <!-- ← EDIT THIS -->
              </span>
            </div>
 
            <!-- GITHUB -->
            <div class="flip-card__contact-row">
              <span class="flip-card__contact-key">github</span>
              <span class="flip-card__contact-eq">=</span>
              <span class="flip-card__contact-val">
                <a href="https://paul-ruback.github.io/portfolio/" target="_blank" rel="noopener">
                  github.com/paul-ruback  <!-- ← EDIT THIS -->
                </a>
              </span>
            </div>
 
            <!-- LINKEDIN -->
            <div class="flip-card__contact-row">
              <span class="flip-card__contact-key">linkedin</span>
              <span class="flip-card__contact-eq">=</span>
              <span class="flip-card__contact-val">
                <a href="https://linkedin.com/in/yourusername" target="_blank" rel="noopener">
                  linkedin.com/in/paulruback  <!-- ← EDIT THIS -->
                </a>
              </span>
            </div>
 
            <!-- LOCATION -->
            <div class="flip-card__contact-row">
              <span class="flip-card__contact-key">location</span>
              <span class="flip-card__contact-eq">=</span>
              <span class="flip-card__contact-val">
                Paris and New York  <!-- ← EDIT THIS -->
              </span>
            </div>
 
            <!--
              ADD MORE ROWS by copying the block above.
              Common extras:
                <span class="flip-card__contact-key">twitter</span>
                <span class="flip-card__contact-key">website</span>
                <span class="flip-card__contact-key">dribbble</span>
            -->
 
          </div>
 
          <div class="flip-card__back-footer">
            <span>
              <span class="flip-card__prompt-symbol">~</span>
              <span class="flip-card__cursor" style="animation-delay:0.5s"></span>
            </span>
            <span class="flip-card__back-footer-right">⟵ flip back</span>
          </div>
 
        </div>
      </div>
      <!-- ── END BACK ──────────────────────────────────────── -->
 
    </div>
  </div>
 
 
  <script>
    /* ============================================================
       PASTE THIS INTO YOUR SITE'S JS FILE (or keep inline)
       ============================================================ */
    (function () {
      const scene = document.getElementById('cardScene');
      const card  = document.getElementById('flipCard');
 
      if (!scene || !card) return;
 
      function toggle() {
        card.classList.toggle('is-flipped');
        scene.setAttribute('aria-pressed', card.classList.contains('is-flipped'));
      }
 
      scene.addEventListener('click', toggle);
 
      scene.addEventListener('keydown', function (e) {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          toggle();
        }
      });
    })();
  </script>
 
</body>
</html>

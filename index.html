<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0e0e;
    color: #fff;
    font-family: system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #drop-zone {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem; z-index: 10;
    transition: background 0.2s;
  }
  #drop-zone.drag-over { background: rgba(255,255,255,0.05); }
  #drop-zone.hidden { display: none; }

  .drop-icon {
    width: 56px; height: 56px;
    border: 1.5px solid #444; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  #drop-zone p { color: #666; font-size: 0.9rem; }
  #drop-zone strong { color: #aaa; font-size: 1rem; font-weight: 500; }
  #file-input { display: none; }

  .pick-btn {
    margin-top: 0.5rem;
    padding: 0.55rem 1.5rem;
    background: transparent;
    border: 1px solid #333;
    border-radius: 6px;
    color: #888;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .pick-btn:hover { border-color: #666; color: #ccc; }

  #viewer {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
  }
  #viewer.active { display: flex; }

  #slide {
    position: relative;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }

  #slide img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #slide img.fade { opacity: 0; }

  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.25);
    font-size: 2rem; padding: 1rem;
    transition: color 0.15s;
    z-index: 5;
  }
  .arrow:hover { color: rgba(255,255,255,0.8); }
  #prev { left: 0; }
  #next { right: 0; }
  .arrow.hidden { display: none; }

  #hud {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 1.25rem;
    z-index: 10;
  }
  #counter { color: #555; font-size: 0.8rem; letter-spacing: 0.06em; }

  #add-btn {
    background: none; border: 1px solid #333; border-radius: 6px;
    color: #555; font-size: 0.75rem; padding: 0.3rem 0.8rem;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
  }
  #add-btn:hover { border-color: #666; color: #aaa; }

  #thumbs {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 80px;
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 0 1rem;
    opacity: 0; transition: opacity 0.3s;
    overflow-x: auto; overflow-y: hidden;
    scrollbar-width: none;
    pointer-events: none;
  }
  #thumbs::-webkit-scrollbar { display: none; }
  body:hover #thumbs { opacity: 1; pointer-events: all; }

  .thumb {
    flex: 0 0 52px; height: 52px;
    border-radius: 4px; overflow: hidden;
    border: 1.5px solid transparent;
    cursor: pointer; transition: border-color 0.15s, opacity 0.15s;
    opacity: 0.4;
  }
  .thumb.active { border-color: #fff; opacity: 1; }
  .thumb:hover { opacity: 0.9; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
</style>
</head>
<body>

<div id="drop-zone">
  <div class="drop-icon">⊕</div>
  <strong>Drop photos here</strong>
  <p>or</p>
  <button class="pick-btn" onclick="document.getElementById('file-input').click()">Choose files</button>
  <input type="file" id="file-input" accept="image/*" multiple />
</div>

<div id="viewer">
  <div id="slide">
    <button class="arrow hidden" id="prev">&#8592;</button>
    <img id="main-img" src="" alt="" />
    <button class="arrow hidden" id="next">&#8594;</button>
  </div>
</div>

<div id="hud" style="display:none">
  <span id="counter">1 / 1</span>
  <button id="add-btn" onclick="document.getElementById('file-input').click()">+ Add photos</button>
</div>

<div id="thumbs"></div>

<script>
  let photos = [];
  let current = 0;

  const dropZone  = document.getElementById('drop-zone');
  const viewer    = document.getElementById('viewer');
  const mainImg   = document.getElementById('main-img');
  const prevBtn   = document.getElementById('prev');
  const nextBtn   = document.getElementById('next');
  const counter   = document.getElementById('counter');
  const hud       = document.getElementById('hud');
  const thumbsEl  = document.getElementById('thumbs');
  const fileInput = document.getElementById('file-input');

  function loadFiles(files) {
    const imgs = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (!imgs.length) return;
    imgs.forEach(f => {
      const url = URL.createObjectURL(f);
      photos.push(url);
      addThumb(url, photos.length - 1);
    });
    if (photos.length === imgs.length) show(0);
    else updateUI();
  }

  fileInput.addEventListener('change', e => loadFiles(e.target.files));

  document.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  document.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  document.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    loadFiles(e.dataTransfer.files);
  });

  function show(index) {
    if (!photos.length) return;
    current = Math.max(0, Math.min(index, photos.length - 1));
    mainImg.classList.add('fade');
    setTimeout(() => {
      mainImg.src = photos[current];
      mainImg.classList.remove('fade');
    }, 150);
    updateUI();
  }

  function updateUI() {
    dropZone.classList.add('hidden');
    viewer.classList.add('active');
    hud.style.display = 'flex';
    counter.textContent = current + 1 + ' / ' + photos.length;
    prevBtn.classList.toggle('hidden', current === 0);
    nextBtn.classList.toggle('hidden', current === photos.length - 1);
    document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
    const active = thumbsEl.children[current];
    if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  function addThumb(url, index) {
    const div = document.createElement('div');
    div.className = 'thumb';
    const img = document.createElement('img');
    img.src = url;
    div.appendChild(img);
    div.addEventListener('click', () => show(index));
    thumbsEl.appendChild(div);
  }

  prevBtn.addEventListener('click', () => show(current - 1));
  nextBtn.addEventListener('click', () => show(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
  });

  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const delta = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(delta) > 50) show(current + (delta < 0 ? 1 : -1));
  });
</script>
</body>
</html>

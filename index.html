<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <title>Studio Christopher</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f4f0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 3rem 3rem 1.5rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #111;
    }
    header span {
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.04em;
    }

    /* ── MASONRY GRID ── */
    .gallery {
      columns: 3;
      column-gap: 12px;
      padding: 0 3rem 4rem;
    }
    @media (max-width: 900px) { .gallery { columns: 2; padding: 0 1.5rem 3rem; } }
    @media (max-width: 500px) { .gallery { columns: 1; padding: 0 1rem 2rem; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 12px;
      overflow: hidden;
      cursor: zoom-in;
      background: #e8e6e1;
    }
    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease, opacity 0.3s;
      opacity: 0;
    }
    .gallery-item img.loaded { opacity: 1; }
    .gallery-item:hover img { transform: scale(1.02); }
    .gallery-item video {
      width: 100%;
      display: block;
      transition: transform 0.5s ease;
    }
    .gallery-item:hover video { transform: scale(1.02); }

    /* ── ARTIFACTS PLACEHOLDER ── */
    .section-placeholder {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 3rem;
    }
    .section-placeholder span {
      font-family: 'Spectral', Georgia, serif;
      font-size: 13px;
      font-weight: 300;
      color: rgba(0,0,0,0.2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #lightbox img.fade { opacity: 0; }
    .lb-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.3); font-size: 2rem; padding: 1.5rem;
      transition: color 0.15s; z-index: 5;
      pointer-events: all;
    }
    .lb-btn:hover { color: #fff; }
    #lb-prev { left: 0; }
    #lb-next { right: 0; }
    .lb-btn.hidden { display: none; }
    #lb-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.4); font-size: 1.5rem;
      transition: color 0.15s;
    }
    #lb-close:hover { color: #fff; }
    #lb-counter {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font-size: 0.8rem; letter-spacing: 0.06em;
    }

    /* ── TERMINAL CARD ── */
    .term-wrap {
      padding: 0 3rem 4rem;
      box-sizing: border-box;
      width: 100%;
    }
    @media (max-width: 900px) { .term-wrap { padding: 0 1.5rem 3rem; } }
    @media (max-width: 500px) { .term-wrap { padding: 0 1rem 2rem; } }

    .term {
      width: 100%;
      background: transparent;
      border: 0.5px solid rgba(17,17,17,0.12);
      border-radius: 14px;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      box-sizing: border-box;
    }
    .term-inner { padding: 28px 32px; }
    .term-winbar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
    }
    .term-dot { width: 10px; height: 10px; border-radius: 50%; }
    .term-wintitle { font-size: 10px; color: #999; margin-left: 8px; letter-spacing: 0.08em; }
    .term-prompt {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }
    .term-ps { color: #79c0ff; }
    .term-name {
      font-size: 28px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 6px;
      opacity: 0;
      animation: term-popin 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;
    }
    .term-role {
      font-size: 11px;
      color: #999;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      opacity: 0;
      animation: term-fade 0.4s ease 1.2s forwards;
    }
    .term-divider {
      border: none;
      border-top: 0.5px solid rgba(17,17,17,0.08);
      margin-bottom: 20px;
    }
    .term-contacts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px 24px;
    }
    @media (max-width: 900px) { .term-contacts { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .term-contacts { grid-template-columns: 1fr; } }

    .term-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      opacity: 0;
      animation: term-fade 0.4s ease forwards;
    }
    .term-row:nth-child(1) { animation-delay: 1.5s; }
    .term-row:nth-child(2) { animation-delay: 1.8s; }
    .term-row:nth-child(3) { animation-delay: 2.1s; }
    .term-row:nth-child(4) { animation-delay: 2.4s; }

    .term-key { color: #999; letter-spacing: 0.08em; }
    .term-val a { font-size: 12px; text-decoration: none; }
    .term-val a:hover { text-decoration: underline; }
    .term-val-plain { font-size: 12px; color: #999; }
    .term-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 0.5px solid rgba(17,17,17,0.08);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .term-cursor {
      display: inline-block;
      width: 7px; height: 14px;
      background: #111;
      vertical-align: middle;
      animation: term-blink 1s step-end infinite;
    }

    @keyframes term-popin {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes term-fade { to { opacity: 1; } }
    @keyframes term-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── CUBE NAV ── */
.cnav {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s ease;
}
.cnav.out { opacity: 0; pointer-events: none; }
.cnav-inner {
  position: relative;
  display: flex;
  align-items: center;
}
.nav-labels {
  display: flex;
  align-items: center;
  gap: 20px;
  overflow: hidden;
  max-width: 0;
  opacity: 0;
  white-space: nowrap;
  transition: max-width 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
  background: rgba(245,244,240,0.85);
  padding: 4px 10px;
  border-radius: 4px;
}
.cnav-inner:hover .nav-labels { max-width: 260px; opacity: 1; }
.nav-lbl {
  font-family: 'Spectral', Georgia, serif;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.65);
  cursor: pointer;
  padding: 6px 2px;
  user-select: none;
  transition: color 0.2s, transform 0.2s;
}
.nav-lbl:hover { color: rgba(0,0,0,0.85); transform: translateY(-1px); }
.nav-lbl.active { color: rgba(0,0,0,0.9); }
.nav-divider {
  width: 0.5px;
  height: 10px;
  background: rgba(0,0,0,0.15);
  flex-shrink: 0;
}
.cube-scene {
  width: 40px;
  height: 40px;
  perspective: 260px;
  flex-shrink: 0;
  cursor: pointer;
}
.cube {
  width: 40px;
  height: 40px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
  animation: cubeIdle 5s ease-in-out infinite;
}
.cube-face {
  position: absolute;
  width: 40px;
  height: 40px;
  background: rgba(245,244,240,0.94);
  border: 0.5px solid rgba(0,0,0,0.13);
}
.face-front  { transform: translateZ(20px); }
.face-bottom { transform: rotateX(-90deg) translateZ(20px); }
.face-back   { transform: rotateX(180deg) translateZ(20px); }
.face-top    { transform: rotateX(90deg)  translateZ(20px); }
.face-left   { transform: rotateY(-90deg) translateZ(20px); }
.face-right  { transform: rotateY(90deg)  translateZ(20px); }
.cnav-inner:hover .cube { animation-play-state: paused; }
.cube-dots {
  display: flex;
  gap: 5px;
  justify-content: center;
  position: absolute;
  bottom: -14px;
  left: 50%;
  transform: translateX(-50%);
}
.cube-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(0,0,0,0.16);
  transition: background 0.25s;
}
.cube-dot.active { background: rgba(0,0,0,0.5); }
@keyframes cubeIdle {
  0%   { transform: rotateX(var(--rx,0deg)) rotateY(0deg); }
  30%  { transform: rotateX(calc(var(--rx,0deg) + 2deg)) rotateY(2deg); }
  65%  { transform: rotateX(calc(var(--rx,0deg) - 1.5deg)) rotateY(-1.5deg); }
  100% { transform: rotateX(var(--rx,0deg)) rotateY(0deg); }
}
    @keyframes cubeIdle {
      0%   { transform: rotateX(var(--base-rot,0deg)) rotateY(0deg); }
      25%  { transform: rotateX(calc(var(--base-rot,0deg) + 2deg)) rotateY(1.5deg); }
      50%  { transform: rotateX(var(--base-rot,0deg)) rotateY(0deg); }
      75%  { transform: rotateX(calc(var(--base-rot,0deg) - 1.5deg)) rotateY(-1deg); }
      100% { transform: rotateX(var(--base-rot,0deg)) rotateY(0deg); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Paul; Strategy; Creative Architecture</h1>
    <span id="photo-count"></span>
  </header>

  <!-- GALLERY -->
  <section id="sec-gallery">
    <div class="gallery" id="gallery"></div>
  </section>

  <!-- ARTIFACTS -->
  <section id="sec-artifacts">
    <div class="section-placeholder">
      <span>Artifact</span>
    </div>
  </section>

  <!-- AGENCY -->
  <section id="sec-agency">
    <div class="term-wrap">
      <div class="term">
        <div class="term-inner">

          <div class="term-winbar">
            <div class="term-dot" style="background:#ff5f57"></div>
            <div class="term-dot" style="background:#febc2e"></div>
            <div class="term-dot" style="background:#28c840"></div>
            <span class="term-wintitle">:)</span>
          </div>

          <div class="term-prompt">
            <span class="term-ps">~</span>
            <span>./Thanks for coming.</span>
          </div>

          <div class="term-name">Paul Christopher</div>
          <div class="term-role">CREATIVE ARCH & STRATEGY</div>

          <hr class="term-divider" />

          <div class="term-contacts">
            <div class="term-row">
              <span class="term-key">email</span>
              <span class="term-val">
                <a href="mailto:paulcruback@gmail.com" style="color:#79c0ff">paulcruback@gmail.com</a>
              </span>
            </div>
            <div class="term-row">
              <span class="term-key">git</span>
              <span class="term-val">
                <a href="https://paul-ruback.github.io/portfolio/" target="_blank" rel="noopener" style="color:#f0a050">github.com/paul-ruback</a>
              </span>
            </div>
            <div class="term-row">
              <span class="term-key">linkedin</span>
              <span class="term-val">
                <a href="https://linkedin.com/in/paulruback" target="_blank" rel="noopener" style="color:#f5c842">linkedin.com/in/paulruback</a>
              </span>
            </div>
            <div class="term-row">
              <span class="term-key">location</span>
              <span class="term-val-plain">Paris & New York.</span>
            </div>
          </div>

          <div class="term-footer">
            <span class="term-ps">~</span>
            <span class="term-cursor"></span>
          </div>

        </div>
      </div>
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button class="lb-btn hidden" id="lb-prev">&#8592;</button>
    <img id="lb-img" src="" alt="" />
    <button class="lb-btn hidden" id="lb-next">&#8594;</button>
    <button id="lb-close">&#10005;</button>
    <span id="lb-counter"></span>
  </div>

  <!-- CUBE NAV -->
<nav class="cnav" id="cnav" aria-label="Section navigation">
  <div class="cnav-inner">
    <div class="nav-labels">
      <span class="nav-lbl active" id="lbl-gallery"   onclick="cubeTo('gallery')">Gallery</span>
      <div class="nav-divider"></div>
      <span class="nav-lbl"        id="lbl-artifacts" onclick="cubeTo('artifacts')">Artifacts</span>
      <div class="nav-divider"></div>
      <span class="nav-lbl"        id="lbl-agency"    onclick="cubeTo('agency')">Agency</span>
    </div>
    <div class="cube-scene">
      <div class="cube" id="cube" style="--rx:0deg">
        <div class="cube-face face-front"></div>
        <div class="cube-face face-bottom"></div>
        <div class="cube-face face-back"></div>
        <div class="cube-face face-top"></div>
        <div class="cube-face face-left"></div>
        <div class="cube-face face-right"></div>
      </div>
    </div>
  </div>
  <div class="cube-dots">
    <div class="cube-dot active" id="dot-gallery"></div>
    <div class="cube-dot"        id="dot-artifacts"></div>
    <div class="cube-dot"        id="dot-agency"></div>
  </div>
</nav>

  <script>
const photos = [
  "photo1.jpg",
 { type: "video", src: "movie1.mp4" },
  "photo5.jpg",
 "photo2.jpg",
 { type: "video", src: "movie2.mov" },
  "photo6.jpg",
 "photo6.1.jpg",
 "photo30.jpg",
  "photo8.jpg",
 "photo7.jpg",
 "photo31.jpg",
 { type: "video", src: "movie3.mov" },
 { type: "video", src: "movie4.mov" },
  "photo9.jpg",
  "photo10.jpg",
  "photo11.jpg",
  "photo12.jpg",
  "photo13.jpg",
 "photo15.jpg",
 "photo16.jpg",
 "photo17.jpg",
 { type: "video", src: "time.mov" },
 "photo18.jpg",
 "photo20.jpg",
 "photo21.jpg",
 "photo22.jpg",
 "photo23.jpg",
];
    // ── GALLERY ──
    const gallery   = document.getElementById('gallery');
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbPrev    = document.getElementById('lb-prev');
    const lbNext    = document.getElementById('lb-next');
    const lbClose   = document.getElementById('lb-close');
    const lbCounter = document.getElementById('lb-counter');
    let current = 0;

    document.getElementById('photo-count').textContent = photos.length + ' works';

    photos.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      if (src.type === 'video') {
        const video = document.createElement('video');
        video.src = src.src;
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        video.autoplay = true;
        item.appendChild(video);
      } else {
        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        img.addEventListener('load', () => img.classList.add('loaded'));
        item.appendChild(img);
      }
      item.addEventListener('click', (e) => { e.stopPropagation(); openLightbox(i); });
      gallery.appendChild(item);
    });

    // ── LIGHTBOX ──
    function openLightbox(index) {
      current = index;
      updateLightbox();
      lightbox.classList.add('open');
    }
    function updateLightbox() {
      lbImg.classList.add('fade');
      setTimeout(() => {
        lbImg.src = typeof photos[current] === 'string' ? photos[current] : '';
        lbImg.classList.remove('fade');
      }, 150);
      lbCounter.textContent = (current + 1) + ' / ' + photos.length;
      lbPrev.classList.toggle('hidden', current === 0);
      lbNext.classList.toggle('hidden', current === photos.length - 1);
    }
    function closeLightbox() { lightbox.classList.remove('open'); }

    lbPrev.addEventListener('click',  (e) => { e.stopPropagation(); current--; updateLightbox(); });
    lbNext.addEventListener('click',  (e) => { e.stopPropagation(); current++; updateLightbox(); });
    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', closeLightbox);

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowLeft'  && current > 0)                { current--; updateLightbox(); }
      if (e.key === 'ArrowRight' && current < photos.length - 1){ current++; updateLightbox(); }
      if (e.key === 'Escape') closeLightbox();
    });

    let touchStartX = 0;
    lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', e => {
      const delta = e.changedTouches[0].clientX - touchStartX;
      if (delta > 50  && current > 0)                { current--; updateLightbox(); }
      if (delta < -50 && current < photos.length - 1){ current++; updateLightbox(); }
    });

   // ── CUBE NAV ──
const cubeNav      = document.getElementById('cnav');
const cube         = document.getElementById('cube');
const cubeSections = ['gallery', 'artifacts', 'agency'];
const cubeRots     = { gallery: 0, artifacts: 90, agency: 180 };
let cubeTimer      = null;
let cubeAnimating  = false;
let cubeCur        = 'gallery';

function cubeSetActive(name) {
  cubeCur = name;
  cubeSections.forEach(s => {
    document.getElementById('lbl-' + s).classList.toggle('active', s === name);
    document.getElementById('dot-' + s).classList.toggle('active', s === name);
  });
}

function cubeRotateTo(name) {
  cube.style.animation = 'none';
  cube.style.setProperty('--rx', cubeRots[name] + 'deg');
  cube.style.transform = `rotateX(${cubeRots[name]}deg)`;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    cube.style.animation = '';
  }));
}

function cubeTo(name) {
  const el = document.getElementById('sec-' + name);
  if (!el) return;
  cubeAnimating = true;
  cubeRotateTo(name);
  cubeSetActive(name);
  window.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
  setTimeout(() => { cubeAnimating = false; }, 700);
}

window.addEventListener('scroll', () => {
  cubeNav.classList.add('out');
  clearTimeout(cubeTimer);
  if (!cubeAnimating) {
    let active = 'gallery';
    cubeSections.forEach(s => {
      const el = document.getElementById('sec-' + s);
      if (el && window.scrollY >= el.offsetTop - window.innerHeight / 2) active = s;
    });
    if (active !== cubeCur) { cubeRotateTo(active); cubeSetActive(active); }
  }
  cubeTimer = setTimeout(() => cubeNav.classList.remove('out'), 850);
});
  </script>
</body>
</html>

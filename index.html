<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <title>Studio Christopher</title>
</head>
<title>Portfolio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f4f0;
    font-family: system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 3rem 3rem 1.5rem;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  header h1 {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: #111;
  }
  header span {
    font-size: 0.8rem;
    color: #999;
    letter-spacing: 0.04em;
  }

  /* ── MASONRY GRID ── */
  .gallery {
    columns: 3;
    column-gap: 12px;
    padding: 0 3rem 4rem;
  }

  @media (max-width: 900px) { .gallery { columns: 2; padding: 0 1.5rem 3rem; } }
  @media (max-width: 500px) { .gallery { columns: 1; padding: 0 1rem 2rem; } }

 .gallery-item {
  break-inside: avoid;
  margin-bottom: 12px;
  overflow: hidden;
  cursor: zoom-in;
  background: #e8e6e1;
}
.gallery-item img {
  width: 100%;
  display: block;
  transition: transform 0.5s ease, opacity 0.3s;
  opacity: 0;
}
.gallery-item img.loaded { opacity: 1; }
.gallery-item:hover img { transform: scale(1.02); }

.gallery-item video {
  width: 100%;
  display: block;
  transition: transform 0.5s ease;
}
.gallery-item:hover video { transform: scale(1.02); }
 
  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    display: block;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #lightbox img.fade { opacity: 0; }

  .lb-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.3); font-size: 2rem; padding: 1.5rem;
    transition: color 0.15s; z-index: 5;
    pointer-events: all;
  }
  .lb-btn:hover { color: #fff; }
  #lb-prev { left: 0; }
  #lb-next { right: 0; }
  .lb-btn.hidden { display: none; }

  #lb-close {
    position: absolute; top: 1.5rem; right: 1.5rem;
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.4); font-size: 1.5rem;
    transition: color 0.15s;
  }
  #lb-close:hover { color: #fff; }

  #lb-counter {
    position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font-size: 0.8rem; letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<header>
  <h1>Portfolio</h1>
  <span id="photo-count"></span>
</header>

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-btn hidden" id="lb-prev">&#8592;</button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-btn hidden" id="lb-next">&#8594;</button>
  <button id="lb-close">&#10005;</button>
  <span id="lb-counter"></span>
</div>

<script>
const photos = [
  "photo1.jpg",
 { type: "video", src: "movie1.mp4" },
  "photo5.jpg",
 "photo2.jpg",
 { type: "video", src: "movie2.mov" },
  "photo6.jpg",
 "photo6.1.jpg",
 "photo30.jpg",
  "photo8.jpg",
 "photo7.jpg",
 "photo31.jpg",
 { type: "video", src: "movie3.mov" },
 { type: "video", src: "movie4.mov" },
  "photo9.jpg",
  "photo10.jpg",
  "photo11.jpg",
  "photo12.jpg",
  "photo13.jpg",
 "photo15.jpg",
 "photo16.jpg",
 "photo17.jpg",
 { type: "video", src: "time.mov" },
 "photo18.jpg",
 "photo20.jpg",
 "photo21.jpg",
 "photo22.jpg",
 "photo23.jpg",
];
  // ─────────────────────────────────────────────

  const gallery   = document.getElementById('gallery');
  const lightbox  = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbPrev    = document.getElementById('lb-prev');
  const lbNext    = document.getElementById('lb-next');
  const lbClose   = document.getElementById('lb-close');
  const lbCounter = document.getElementById('lb-counter');
  let current = 0;

  document.getElementById('photo-count').textContent = photos.length + ' works';

  // Build gallery
 photos.forEach((src, i) => {
  const item = document.createElement('div');
  item.className = 'gallery-item';

  if (src.type === 'video') {
    const video = document.createElement('video');
    video.src = src.src;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.autoplay = true;
    item.appendChild(video);
  } else {
    const img = document.createElement('img');
    img.src = src;
    img.alt = '';
    img.addEventListener('load', () => img.classList.add('loaded'));
    item.appendChild(img); // ← fixed
  }

  item.addEventListener('click', (e) => { e.stopPropagation(); openLightbox(i); });
  gallery.appendChild(item);
});
 
  // Lightbox
  function openLightbox(index) {
    current = index;
    lbImg.src = photos[current];
    updateLightbox();
    lightbox.classList.add('open');
  }

  function updateLightbox() {
    lbImg.classList.add('fade');
    setTimeout(() => {
      lbImg.src = photos[current];
      lbImg.classList.remove('fade');
    }, 150);
    lbCounter.textContent = (current + 1) + ' / ' + photos.length;
    lbPrev.classList.toggle('hidden', current === 0);
    lbNext.classList.toggle('hidden', current === photos.length - 1);
  }

  function closeLightbox() { lightbox.classList.remove('open'); }

  lbPrev.addEventListener('click', (e) => { e.stopPropagation(); current--; updateLightbox(); });
  lbNext.addEventListener('click', (e) => { e.stopPropagation(); current++; updateLightbox(); });
  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', closeLightbox);

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft' && current > 0)               { current--; updateLightbox(); }
    if (e.key === 'ArrowRight' && current < photos.length-1){ current++; updateLightbox(); }
    if (e.key === 'Escape') closeLightbox();
  });

  // Touch swipe in lightbox
  let touchStartX = 0;
  lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend', e => {
    const delta = e.changedTouches[0].clientX - touchStartX;
    if (delta > 50 && current > 0)               { current--; updateLightbox(); }
    if (delta < -50 && current < photos.length-1){ current++; updateLightbox(); }
  });
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Contact Card</title>

  <!--
    Requires Space Mono from Google Fonts.
    Add this to your site's <head> if not already present:
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       PASTE THIS ENTIRE <style> BLOCK INTO YOUR SITE'S CSS
       ============================================================ */

    /* --- Outer wrapper: mirrors your .gallery padding exactly -- */
    .term-wrap {
      padding: 0 3rem 4rem;
      box-sizing: border-box;
      width: 100%;
    }

    @media (max-width: 900px) { .term-wrap { padding: 0 1.5rem 3rem; } }
    @media (max-width: 500px) { .term-wrap { padding: 0 1rem 2rem;   } }

    /* --- Terminal card ----------------------------------------- */
    .term {
      width: 100%;
      background: transparent;
      border: 0.5px solid rgba(17, 17, 17, 0.12);
      border-radius: 14px;
      overflow: hidden;
      font-family: 'Space Mono', monospace;
      box-sizing: border-box;
    }

    .term-inner {
      padding: 28px 32px;
    }

    /* --- Window chrome ----------------------------------------- */
    .term-winbar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
    }

    .term-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .term-wintitle {
      font-size: 10px;
      color: #999;
      margin-left: 8px;
      letter-spacing: 0.08em;
    }

    /* --- Prompt row -------------------------------------------- */
    .term-prompt {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }

    .term-ps { color: #79c0ff; }  /* blue prompt symbol */

    /* --- Name -------------------------------------------------- */
    .term-name {
      font-size: 28px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 6px;
      opacity: 0;
      animation: term-popin 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s forwards;
    }

    /* --- Role -------------------------------------------------- */
    .term-role {
      font-size: 11px;
      color: #999;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
      opacity: 0;
      animation: term-fade 0.4s ease 1.2s forwards;
    }

    /* --- Divider ----------------------------------------------- */
    .term-divider {
      border: none;
      border-top: 0.5px solid rgba(17, 17, 17, 0.08);
      margin-bottom: 20px;
    }

    /* --- Contact grid ------------------------------------------ */
    .term-contacts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px 24px;
    }

    @media (max-width: 900px) { .term-contacts { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .term-contacts { grid-template-columns: 1fr; } }

    .term-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      opacity: 0;
      animation: term-fade 0.4s ease forwards;
    }

    .term-row:nth-child(1) { animation-delay: 1.5s; }
    .term-row:nth-child(2) { animation-delay: 1.8s; }
    .term-row:nth-child(3) { animation-delay: 2.1s; }
    .term-row:nth-child(4) { animation-delay: 2.4s; }

    /* add more rows? continue the pattern: 2.7s, 3.0s, etc. */

    .term-key {
      color: #999;
      letter-spacing: 0.08em;
    }

    .term-val a {
      font-size: 12px;
      text-decoration: none;
    }

    .term-val a:hover {
      text-decoration: underline;
    }

    .term-val-plain {
      font-size: 12px;
      color: #999;
    }

    /* --- Footer blinking cursor -------------------------------- */
    .term-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 0.5px solid rgba(17, 17, 17, 0.08);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .term-cursor {
      display: inline-block;
      width: 7px;
      height: 14px;
      background: #111;
      vertical-align: middle;
      animation: term-blink 1s step-end infinite;
    }

    /* --- Keyframes --------------------------------------------- */
    @keyframes term-popin {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    @keyframes term-fade {
      to { opacity: 1; }
    }

    @keyframes term-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
</head>
<body>

  <!--
  ================================================================
    TERMINAL CONTACT CARD — portfolio hero component
    Matches: system-ui · #f5f4f0 bg · #111/#999 palette
    Layout:  mirrors .gallery padding (3rem / 1.5rem / 1rem)
  ================================================================
  HOW TO USE
  ──────────
  1. Copy the <style> block into your CSS.
  2. Paste the .term-wrap div below your <header> (or wherever
     you want it — it will align flush with your gallery columns).
  3. Replace every  ← EDIT THIS  comment with your real info.
  No JS needed.
  ================================================================
  -->

  <div class="term-wrap">
    <div class="term">
      <div class="term-inner">

        <!-- window chrome -->
        <div class="term-winbar">
          <div class="term-dot" style="background:#ff5f57"></div>
          <div class="term-dot" style="background:#febc2e"></div>
          <div class="term-dot" style="background:#28c840"></div>
          <span class="term-wintitle">:)</span>  <!-- ← EDIT THIS (or remove) -->
        </div>

        <!-- shell prompt -->
        <div class="term-prompt">
          <span class="term-ps">~</span>
          <span>./Thanks for coming.</span>  <!-- ← EDIT THIS -->
        </div>

        <!-- your name -->
        <div class="term-name">
          Paul Christopher <!-- ← EDIT THIS -->
        </div>

        <!-- your role / tagline — keep uppercase for terminal feel -->
        <div class="term-role">
           CREATIVE ARCHITECTURE & STRATEGY <!-- ← EDIT THIS -->
        </div>

        <hr class="term-divider" />

        <div class="term-contacts">

          <!-- EMAIL -->
          <div class="term-row">
            <span class="term-key">email</span>
            <span class="term-val">
              <a href="mailto:paulcruback@gmail.com" style="color:#79c0ff">
                paulcruback@gmail.com  <!-- ← EDIT THIS -->
              </a>
            </span>
          </div>

          <!-- GITHUB -->
          <div class="term-row">
            <span class="term-key">git</span>
            <span class="term-val">
              <a href="https://paul-ruback.github.io/portfolio/" target="_blank" rel="noopener" style="color:#f0a050">
                github.com/click  <!-- ← EDIT THIS -->
              </a>
            </span>
          </div>

          <!-- LINKEDIN -->
          <div class="term-row">
            <span class="term-key">linkedin</span>
            <span class="term-val">
              <a href="https://linkedin.com/in/paulruback" target="_blank" rel="noopener" style="color:#f5c842">
                linkedin.com/in/paulruback  <!-- ← EDIT THIS -->
              </a>
            </span>
          </div>

                   <!-- LOCATION — plain text, no link -->
          <div class="term-row">
            <span class="term-key">location</span>
            <span class="term-val-plain">Paris & New York.</span>  <!-- ← EDIT THIS -->
          </div>
          </div>
 
          <!--

        <!-- blinking cursor -->
        <div class="term-footer">
          <span class="term-ps">~</span>
          <span class="term-cursor"></span>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
